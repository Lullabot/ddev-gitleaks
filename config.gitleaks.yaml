#ddev-generated
hooks:
  post-start:
    # Warn (never block) if the container environment or project .env files
    # contain secrets/API keys. gitleaks-scan always exits 0; the command -v
    # guard keeps `ddev start` safe even if the binary is somehow missing.
    - exec: "command -v gitleaks-scan >/dev/null && gitleaks-scan || true"
